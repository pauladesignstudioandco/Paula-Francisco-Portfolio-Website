<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <script>
        // Redirect all 404s to index.html for SPA routing on GitHub Pages
        var repo = "/Paula-Francisco-Portfolio-Website";
        var l = window.location;
        l.replace(l.protocol + "//" + l.host + repo + "/?p=" + encodeURIComponent(l.pathname.replace(repo, "") + l.search + l.hash));
    </script>
</head>

<body></body>

</html>
