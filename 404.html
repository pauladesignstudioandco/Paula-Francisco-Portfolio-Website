<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect all 404s to index.html while preserving the path
      var repo = "/Paula-Francisco-Portfolio-Website";
      var path = location.pathname.replace(repo, "");
      location.replace(repo + "/?p=" + encodeURIComponent(path + location.search + location.hash));
    </script>
  </head>
  <body></body>
</html>
